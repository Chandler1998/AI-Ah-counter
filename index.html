<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 哼哈官 - Toastmasters 会议助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        .panel {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .control-panel h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .session-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ee5a5a;
        }

        .btn-success {
            background: #51cf66;
            color: white;
        }

        .btn-success:hover {
            background: #40c057;
        }

        .btn-secondary {
            background: #e9ecef;
            color: #495057;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .speaker-section {
            margin-bottom: 24px;
        }

        .speaker-section h3 {
            font-size: 1rem;
            color: #666;
            margin-bottom: 12px;
        }

        .speaker-grid {
            display: grid;
            gap: 8px;
        }

        .speaker-btn {
            padding: 10px 12px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        .speaker-btn:hover {
            background: #e9ecef;
        }

        .speaker-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .speaker-btn .speaker-label {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
            overflow: hidden;
            min-width: 0;
        }

        .speaker-btn .count {
            background: rgba(0,0,0,0.1);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .speaker-btn.active .count {
            background: rgba(255,255,255,0.3);
        }

        .speaker-btn .timer-badge {
            font-size: 0.78rem;
            color: #868e96;
            flex-shrink: 0;
            min-width: 34px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .speaker-btn.active .timer-badge {
            color: rgba(255,255,255,0.8);
        }

        .speaker-btn .del-btn {
            display: none;
            background: rgba(255,107,107,0.85);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 2px 7px;
            font-size: 0.8rem;
            cursor: pointer;
            flex-shrink: 0;
            line-height: 1.5;
            transition: background 0.2s;
        }

        .speaker-btn:hover .del-btn {
            display: block;
        }

        .speaker-btn.active .del-btn {
            background: rgba(255,255,255,0.35);
            color: white;
        }

        .speaker-btn .name-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 0.95rem;
            font-weight: 600;
            color: inherit;
            min-width: 0;
        }

        .speaker-btn.active .name-input {
            color: white;
        }

        .add-speaker-row {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .add-speaker-row input {
            flex: 1;
            padding: 10px 12px;
            border: 2px dashed #c5c9d6;
            border-radius: 10px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            color: #333;
            background: #f8f9fa;
        }

        .add-speaker-row input:focus {
            border-color: #667eea;
            background: white;
        }

        .add-speaker-row input::placeholder {
            color: #adb5bd;
        }

        .add-speaker-row .btn-add {
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .add-speaker-row .btn-add:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }

        .stats-panel h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #333;
        }

        .current-speaker {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
        }

        .current-speaker .label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .current-speaker .name {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .current-speaker .total {
            margin-top: 10px;
            font-size: 2.5rem;
            font-weight: 800;
        }

        .current-speaker .meta {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.25);
        }

        .current-speaker .meta-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .current-speaker .meta-item .meta-label {
            font-size: 0.75rem;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }

        .current-speaker .meta-item .meta-value {
            font-size: 1.3rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .rate-highlight { color: #ffd43b; }

        .ah-stats {
            margin-bottom: 24px;
        }

        .ah-stats h3 {
            font-size: 1rem;
            color: #666;
            margin-bottom: 12px;
        }

        .ah-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }

        .ah-item {
            background: #f8f9fa;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .ah-item.highlight {
            background: #fff3bf;
            border-color: #ffd43b;
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .ah-item .word {
            font-size: 1.4rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }

        .ah-item .count {
            font-size: 1.8rem;
            font-weight: 800;
            color: #667eea;
        }

        .transcript-section h3 {
            font-size: 1rem;
            color: #666;
            margin-bottom: 12px;
        }

        .transcript-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 16px;
            height: 200px;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.8;
            border: 1px solid #e9ecef;
        }

        .transcript-box .segment {
            margin-bottom: 8px;
            padding: 8px 12px;
            background: white;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .transcript-box .speaker {
            font-weight: 600;
            color: #667eea;
            margin-right: 8px;
        }

        .transcript-box .ah-word {
            background: #fff3bf;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #adb5bd;
        }

        .status-dot.listening {
            background: #51cf66;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .export-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }

        .rename-tip {
            font-size: 0.78rem;
            color: #adb5bd;
            margin-bottom: 8px;
            text-align: right;
        }

        /* 语言切换按钮 */
        .lang-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .lang-switch .lang-btn {
            flex: 1;
            padding: 9px 10px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            background: #f8f9fa;
            color: #495057;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .lang-switch .lang-btn:hover {
            background: #e9ecef;
        }

        .lang-switch .lang-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 3px 10px rgba(102,126,234,0.35);
        }

        /* 拖拽手柄 */
        .speaker-btn .drag-handle {
            color: #ced4da;
            font-size: 0.9rem;
            cursor: grab;
            flex-shrink: 0;
            padding: 0 2px;
            user-select: none;
            -webkit-user-select: none;
            transition: color 0.2s;
        }

        .speaker-btn:hover .drag-handle {
            color: #868e96;
        }

        .speaker-btn.active .drag-handle {
            color: rgba(255,255,255,0.5);
        }

        .speaker-btn .drag-handle:active {
            cursor: grabbing;
        }

        .speaker-btn.dragging {
            opacity: 0.4;
            transform: scale(0.96);
        }

        .speaker-btn.drag-over {
            border-color: #667eea;
            border-style: dashed;
            background: #f0f0ff;
        }

        .speaker-btn.active.drag-over {
            border-color: rgba(255,255,255,0.6);
            border-style: dashed;
        }

        .drag-ghost {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.85;
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        /* 页面页脚 */
        .page-footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            margin-top: 28px;
            padding-bottom: 20px;
            line-height: 1.8;
        }
        .page-footer a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.35);
            transition: color 0.2s, border-color 0.2s;
        }
        .page-footer a:hover {
            color: #ffd43b;
            border-color: #ffd43b;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 哼哈官</h1>
            <p>Toastmasters 会议赘语统计助手</p>
        </header>

        <div class="main-content">
            <div class="panel control-panel">
                <h2>会议控制</h2>

                <div class="status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">准备就绪</span>
                </div>

                <div class="lang-switch">
                    <button class="lang-btn active" id="langZhBtn" onclick="setLang('zh')">中文模式</button>
                    <button class="lang-btn" id="langEnBtn" onclick="setLang('en')">English</button>
                </div>

                <div class="session-controls">
                    <button class="btn btn-primary" id="startBtn" onclick="startSession()">开始</button>
                    <button class="btn btn-danger" id="stopBtn" onclick="stopSession()" disabled>停止</button>
                </div>

                <div class="speaker-section">
                    <h3>当前发言人</h3>
                    <p class="rename-tip">双击角色名可重命名，拖动手柄可排序</p>
                    <div class="speaker-grid" id="speakerGrid"></div>

                    <div class="add-speaker-row" style="margin-top: 10px;">
                        <input type="text" id="newSpeakerInput" placeholder="输入角色名称…" maxlength="20"
                            onkeydown="if(event.key==='Enter') addCustomSpeaker()">
                        <button class="btn-add" onclick="addCustomSpeaker()" title="添加角色">＋</button>
                    </div>
                </div>

                <div class="export-section">
                    <button class="btn btn-success" onclick="exportReport()" id="exportBtn" disabled>导出报告</button>
                    <button class="btn btn-secondary" onclick="resetAll()" style="margin-left: 10px;">重置</button>
                </div>
            </div>

            <div class="panel stats-panel">
                <h2>实时统计</h2>

                <div class="current-speaker">
                    <div class="label">当前发言人</div>
                    <div class="name" id="currentSpeakerName">请选择发言人</div>
                    <div class="total" id="currentSpeakerTotal">0 次哼哈</div>
                    <div class="meta">
                        <div class="meta-item">
                            <span class="meta-label">发言时长</span>
                            <span class="meta-value" id="currentSpeakerTime">—</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">每分钟哼哈</span>
                            <span class="meta-value rate-highlight" id="currentSpeakerRate">—</span>
                        </div>
                    </div>
                </div>

                <div class="ah-stats">
                    <h3>当前发言人哼哈词统计</h3>
                    <div class="ah-grid" id="currentAhGrid"></div>
                </div>

                <div class="ah-stats">
                    <h3>全场汇总</h3>
                    <div class="ah-grid" id="totalAhGrid"></div>
                </div>

                <div class="transcript-section">
                    <h3>实时转写</h3>
                    <div class="transcript-box" id="transcriptBox">
                        <p style="color:#adb5bd;text-align:center;margin-top:60px;">
                            点击"开始"按钮后，这里将显示实时转写内容...
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <footer class="page-footer">
            问题反馈和交流请联系 <strong>Chandler</strong> ·
            <a href="mailto:wflunch@163.com">wflunch@163.com</a>
        </footer>
    </div>

    <script>
        var DEFAULT_SPEAKERS = [
            { id: 'host',       name: '主持人',       icon: '🎙️', custom: false },
            { id: 'speaker1',   name: '备稿演讲人1', icon: '🎤', custom: false },
            { id: 'speaker2',   name: '备稿演讲人2', icon: '🎤', custom: false },
            { id: 'evaluator1', name: '备稿点评1',   icon: '📋', custom: false },
            { id: 'evaluator2', name: '备稿点评2',   icon: '📋', custom: false },
            { id: 'tt_host',    name: '即兴演讲主持人', icon: '🎭', custom: false },
            { id: 'tt_speaker1',name: '即兴演讲人1', icon: '🌟', custom: false },
            { id: 'tt_speaker2',name: '即兴演讲人2', icon: '🌟', custom: false },
            { id: 'tt_speaker3',name: '即兴演讲人3', icon: '🌟', custom: false },
            { id: 'ge',         name: '总评',         icon: '🏆', custom: false }
        ];

        var speakers = DEFAULT_SPEAKERS.map(function(s) {
            return { id: s.id, name: s.name, icon: s.icon, custom: s.custom };
        });

        var customIdCounter = 1;

        var AH_WORDS_ZH = [
            '嗯', '啊', '呃', '额', '那个', '这个',
            '就是说', '然后', '其实', '就是', '对吧',
            '知道', '明白', '一个', '可能', '应该',
            '或者', '还是', '怎么', '什么'
        ];

        var AH_WORDS_EN = [
            'um', 'uh', 'er', 'ah', 'like',
            'you know', 'so', 'basically', 'actually',
            'right', 'okay', 'well', 'just',
            'literally', 'honestly', 'kind of', 'sort of',
            'i mean', 'anyway'
        ];

        var currentLang = 'zh';
        var AH_WORDS = AH_WORDS_ZH.slice();

        var currentSpeaker = null;
        var isListening = false;
        var recognition = null;
        var stats = {};
        var transcriptHistory = [];

        /* 计时器模块 */
        var speakerTimers = {};
        var activeTimerInterval = null;

        function ensureSpeakerTimer(id) {
            if (!speakerTimers[id]) {
                speakerTimers[id] = { seconds: 0, startTime: null };
            }
        }

        function startSpeakerTimer(id) {
            ensureSpeakerTimer(id);
            speakerTimers[id].startTime = Date.now();
            if (activeTimerInterval) clearInterval(activeTimerInterval);
            activeTimerInterval = setInterval(tickTimer, 1000);
        }

        function pauseSpeakerTimer(id) {
            if (!speakerTimers[id] || speakerTimers[id].startTime === null) return;
            var elapsed = Math.floor((Date.now() - speakerTimers[id].startTime) / 1000);
            speakerTimers[id].seconds += elapsed;
            speakerTimers[id].startTime = null;
            if (activeTimerInterval) {
                clearInterval(activeTimerInterval);
                activeTimerInterval = null;
            }
        }

        function getSpeakerSeconds(id) {
            ensureSpeakerTimer(id);
            var base = speakerTimers[id].seconds;
            if (speakerTimers[id].startTime !== null) {
                base += Math.floor((Date.now() - speakerTimers[id].startTime) / 1000);
            }
            return base;
        }

        function formatTime(secs) {
            var m = Math.floor(secs / 60);
            var s = secs % 60;
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function tickTimer() {
            if (!currentSpeaker) return;
            var secs = getSpeakerSeconds(currentSpeaker);
            var timerEl = document.getElementById('timer-' + currentSpeaker);
            if (timerEl) timerEl.textContent = formatTime(secs);
            refreshCurrentMeta(currentSpeaker, secs);
        }

        function refreshCurrentMeta(id, secs) {
            if (secs === undefined) secs = getSpeakerSeconds(id);
            var timeEl = document.getElementById('currentSpeakerTime');
            var rateEl = document.getElementById('currentSpeakerRate');
            if (timeEl) timeEl.textContent = formatTime(secs);
            if (rateEl) {
                if (secs >= 10) {
                    var mins = secs / 60;
                    var total = stats[id] ? stats[id].total : 0;
                    var rateUnit = currentLang === 'zh' ? ' 次/分钟' : '/min';
                    rateEl.textContent = (total / mins).toFixed(1) + rateUnit;
                } else {
                    rateEl.textContent = '—';
                }
            }
        }

        /* 语言模式切换 */
        function setLang(lang) {
            if (currentLang === lang) return;
            currentLang = lang;
            AH_WORDS = (lang === 'zh') ? AH_WORDS_ZH.slice() : AH_WORDS_EN.slice();
            document.getElementById('langZhBtn').classList.toggle('active', lang === 'zh');
            document.getElementById('langEnBtn').classList.toggle('active', lang === 'en');
            if (recognition && isListening) {
                recognition.lang = (lang === 'zh') ? 'zh-CN' : 'en-US';
            }
            speakers.forEach(function(s) {
                var old = stats[s.id] || { name: s.name, total: 0 };
                stats[s.id] = { name: old.name, total: old.total, words: {} };
                AH_WORDS.forEach(function(w) { stats[s.id].words[w] = 0; });
            });
            renderAhGrid('currentAhGrid');
            renderAhGrid('totalAhGrid');
            updateCurrentStats();
            updateTotalStats();
        }

        /* 拖拽排序 */
        var dragSourceId = null;

        var touchState = {
            active: false,
            sourceId: null,
            ghost: null,
            sourceBtn: null,
            startY: 0,
            currentTarget: null
        };

        function clearDragOver() {
            document.querySelectorAll('.speaker-btn.drag-over').forEach(function(el) {
                el.classList.remove('drag-over');
            });
        }

        function reorderSpeakers(fromId, toId) {
            var fromIdx = speakers.findIndex(function(s) { return s.id === fromId; });
            var toIdx = speakers.findIndex(function(s) { return s.id === toId; });
            if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return;
            var item = speakers.splice(fromIdx, 1)[0];
            speakers.splice(toIdx, 0, item);
            renderSpeakerGrid();
        }

        function touchDragStart(e, speakerId, btn) {
            e.preventDefault();
            var touch = e.touches[0];
            touchState.active = true;
            touchState.sourceId = speakerId;
            touchState.sourceBtn = btn;
            touchState.startY = touch.clientY;
            var rect = btn.getBoundingClientRect();
            var ghost = btn.cloneNode(true);
            ghost.className = 'speaker-btn drag-ghost';
            ghost.style.width = rect.width + 'px';
            ghost.style.left = rect.left + 'px';
            ghost.style.top = rect.top + 'px';
            document.body.appendChild(ghost);
            touchState.ghost = ghost;
            btn.classList.add('dragging');
        }

        document.addEventListener('touchmove', function(e) {
            if (!touchState.active) return;
            e.preventDefault();
            var touch = e.touches[0];
            var ghost = touchState.ghost;
            if (ghost) {
                ghost.style.top = (touch.clientY - ghost.offsetHeight / 2) + 'px';
            }
            clearDragOver();
            var el = document.elementFromPoint(touch.clientX, touch.clientY);
            if (el) {
                var target = el.closest('.speaker-btn');
                if (target && target.dataset.id !== touchState.sourceId) {
                    target.classList.add('drag-over');
                    touchState.currentTarget = target.dataset.id;
                } else {
                    touchState.currentTarget = null;
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', function() {
            if (!touchState.active) return;
            if (touchState.ghost) {
                document.body.removeChild(touchState.ghost);
                touchState.ghost = null;
            }
            if (touchState.sourceBtn) {
                touchState.sourceBtn.classList.remove('dragging');
            }
            if (touchState.currentTarget && touchState.currentTarget !== touchState.sourceId) {
                reorderSpeakers(touchState.sourceId, touchState.currentTarget);
            }
            touchState.active = false;
            touchState.sourceId = null;
            touchState.sourceBtn = null;
            touchState.currentTarget = null;
            clearDragOver();
        });

        /* 统计初始化 */
        function ensureSpeakerStats(speakerId, speakerName) {
            if (!stats[speakerId]) {
                stats[speakerId] = { name: speakerName, total: 0, words: {} };
                AH_WORDS.forEach(function(w) { stats[speakerId].words[w] = 0; });
            }
        }

        function initStats() {
            stats = {};
            speakers.forEach(function(s) { ensureSpeakerStats(s.id, s.name); });
        }

        function initTimers() {
            speakerTimers = {};
            if (activeTimerInterval) {
                clearInterval(activeTimerInterval);
                activeTimerInterval = null;
            }
        }

        /* UI 渲染 */
        function renderSpeakerGrid() {
            var grid = document.getElementById('speakerGrid');
            grid.innerHTML = '';

            speakers.forEach(function(s) {
                var btn = document.createElement('button');
                btn.className = 'speaker-btn';
                btn.dataset.id = s.id;
                btn.draggable = true;
                if (currentSpeaker === s.id) btn.classList.add('active');

                btn.addEventListener('click', function(e) {
                    if (e.target.classList.contains('del-btn')) return;
                    if (e.target.classList.contains('drag-handle')) return;
                    if (e.target.classList.contains('name-input')) return;
                    selectSpeaker(s.id);
                });

                var handle = document.createElement('span');
                handle.className = 'drag-handle';
                handle.textContent = '⠿';
                handle.title = '拖动排序';

                btn.addEventListener('dragstart', function(e) {
                    dragSourceId = s.id;
                    btn.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                    try {
                        var img = new Image();
                        img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAUEBAAAACwAAAAAAQABAAACAkQBADs=';
                        e.dataTransfer.setDragImage(img, 0, 0);
                    } catch(err) {}
                });

                btn.addEventListener('dragend', function() {
                    btn.classList.remove('dragging');
                    dragSourceId = null;
                    clearDragOver();
                });

                btn.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    if (s.id !== dragSourceId) btn.classList.add('drag-over');
                });

                btn.addEventListener('dragleave', function() {
                    btn.classList.remove('drag-over');
                });

                btn.addEventListener('drop', function(e) {
                    e.preventDefault();
                    btn.classList.remove('drag-over');
                    if (dragSourceId && dragSourceId !== s.id) {
                        reorderSpeakers(dragSourceId, s.id);
                    }
                });

                handle.addEventListener('touchstart', function(e) {
                    touchDragStart(e, s.id, btn);
                }, { passive: false });

                var label = document.createElement('span');
                label.className = 'speaker-label';

                var iconSpan = document.createElement('span');
                iconSpan.textContent = s.icon + ' ';
                iconSpan.style.flexShrink = '0';

                var nameInput = document.createElement('input');
                nameInput.className = 'name-input';
                nameInput.type = 'text';
                nameInput.value = s.name;
                nameInput.maxLength = 20;
                nameInput.title = '双击可重命名';
                nameInput.readOnly = true;

                nameInput.addEventListener('dblclick', function(e) {
                    e.stopPropagation();
                    nameInput.readOnly = false;
                    nameInput.focus();
                    nameInput.select();
                });

                function saveName() {
                    nameInput.readOnly = true;
                    var newName = nameInput.value.trim();
                    if (!newName) { nameInput.value = s.name; return; }
                    s.name = newName;
                    if (stats[s.id]) stats[s.id].name = newName;
                    if (currentSpeaker === s.id) {
                        document.getElementById('currentSpeakerName').textContent = newName;
                    }
                }

                nameInput.addEventListener('blur', saveName);
                nameInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { e.preventDefault(); saveName(); nameInput.blur(); }
                    if (e.key === 'Escape') { nameInput.value = s.name; nameInput.blur(); }
                });

                label.appendChild(iconSpan);
                label.appendChild(nameInput);

                var timerBadge = document.createElement('span');
                timerBadge.className = 'timer-badge';
                timerBadge.id = 'timer-' + s.id;
                var secs = getSpeakerSeconds(s.id);
                timerBadge.textContent = secs > 0 ? formatTime(secs) : '';

                var countSpan = document.createElement('span');
                countSpan.className = 'count';
                countSpan.id = 'count-' + s.id;
                countSpan.textContent = (stats[s.id] && stats[s.id].total) || 0;

                var delBtn = document.createElement('button');
                delBtn.className = 'del-btn';
                delBtn.textContent = '✕';
                delBtn.title = '删除该角色';
                delBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    deleteSpeaker(s.id);
                });

                btn.appendChild(handle);
                btn.appendChild(label);
                btn.appendChild(timerBadge);
                btn.appendChild(countSpan);
                btn.appendChild(delBtn);
                grid.appendChild(btn);
            });
        }

        function renderAhGrid(containerId) {
            var container = document.getElementById(containerId);
            container.innerHTML = AH_WORDS.map(function(w) {
                var safeId = w.replace(/\s+/g, '_');
                return '<div class="ah-item" id="' + containerId + '-' + safeId + '">' +
                    '<div class="word">"' + w + '"</div>' +
                    '<div class="count" id="' + containerId + '-count-' + safeId + '">0</div>' +
                '</div>';
            }).join('');
        }

        function initUI() {
            renderSpeakerGrid();
            renderAhGrid('currentAhGrid');
            renderAhGrid('totalAhGrid');
        }

        /* 自定义角色 */
        function addCustomSpeaker() {
            var input = document.getElementById('newSpeakerInput');
            var name = input.value.trim();
            if (!name) { input.focus(); return; }
            if (speakers.some(function(s) { return s.name === name; })) {
                alert('已存在同名角色：' + name);
                return;
            }
            var newId = 'custom_' + (customIdCounter++);
            var icons = ['👤', '💬', '🗣️', '📢', '✨', '🌈'];
            var icon = icons[(customIdCounter - 2) % icons.length];
            var newSpkr = { id: newId, name: name, icon: icon, custom: true };
            speakers.push(newSpkr);
            ensureSpeakerStats(newId, name);
            ensureSpeakerTimer(newId);
            input.value = '';
            renderSpeakerGrid();
            selectSpeaker(newId);
        }

        function deleteSpeaker(speakerId) {
            var s = speakers.find(function(sp) { return sp.id === speakerId; });
            if (!s) return;
            var hasData = stats[speakerId] && stats[speakerId].total > 0;
            if (hasData) {
                if (!confirm('角色「' + s.name + '」已有 ' + stats[speakerId].total + ' 次赘语记录，确认删除？')) return;
            }
            if (currentSpeaker === speakerId && isListening) {
                pauseSpeakerTimer(speakerId);
            }
            speakers = speakers.filter(function(sp) { return sp.id !== speakerId; });
            delete stats[speakerId];
            delete speakerTimers[speakerId];
            if (currentSpeaker === speakerId) {
                currentSpeaker = null;
                document.getElementById('currentSpeakerName').textContent = '请选择发言人';
                document.getElementById('currentSpeakerTotal').textContent = '0 次哼哈';
                document.getElementById('currentSpeakerTime').textContent = '—';
                document.getElementById('currentSpeakerRate').textContent = '—';
                resetCurrentAhGrid();
            }
            renderSpeakerGrid();
            updateTotalStats();
        }

        /* 发言人选择 */
        function selectSpeaker(speakerId) {
            if (currentSpeaker && currentSpeaker !== speakerId && isListening) {
                pauseSpeakerTimer(currentSpeaker);
                var prevTimer = document.getElementById('timer-' + currentSpeaker);
                if (prevTimer) prevTimer.textContent = formatTime(getSpeakerSeconds(currentSpeaker));
            }
            currentSpeaker = speakerId;
            var speaker = speakers.find(function(s) { return s.id === speakerId; });
            if (!speaker) return;
            ensureSpeakerTimer(speakerId);
            if (isListening) {
                startSpeakerTimer(speakerId);
            }
            renderSpeakerGrid();
            document.getElementById('currentSpeakerName').textContent = speaker.name;
            updateCurrentStats();
        }

        /* 统计更新 */
        function resetCurrentAhGrid() {
            AH_WORDS.forEach(function(w) {
                var safeId = w.replace(/\s+/g, '_');
                var el = document.getElementById('currentAhGrid-' + safeId);
                if (el) el.getElementsByClassName('count')[0].textContent = '0';
            });
        }

        function updateCurrentStats() {
            if (!currentSpeaker || !stats[currentSpeaker]) return;
            var sp = stats[currentSpeaker];
            var unit = currentLang === 'zh' ? ' 次哼哈' : ' fillers';
            document.getElementById('currentSpeakerTotal').textContent = sp.total + unit;
            AH_WORDS.forEach(function(w) {
                var safeId = w.replace(/\s+/g, '_');
                var el = document.getElementById('currentAhGrid-' + safeId);
                if (el) el.getElementsByClassName('count')[0].textContent = sp.words[w] || 0;
            });
            refreshCurrentMeta(currentSpeaker);
        }

        function updateTotalStats() {
            var totalByWord = {};
            AH_WORDS.forEach(function(w) { totalByWord[w] = 0; });
            speakers.forEach(function(s) {
                if (!stats[s.id]) return;
                AH_WORDS.forEach(function(w) {
                    totalByWord[w] += stats[s.id].words[w] || 0;
                });
                var countEl = document.getElementById('count-' + s.id);
                if (countEl) countEl.textContent = stats[s.id].total;
            });
            AH_WORDS.forEach(function(w) {
                var safeId = w.replace(/\s+/g, '_');
                var el = document.getElementById('totalAhGrid-' + safeId);
                if (el) el.getElementsByClassName('count')[0].textContent = totalByWord[w];
            });
        }

        /* 赘词检测 */
        function detectAhWords(text) {
            var detected = [];
            AH_WORDS.forEach(function(word) {
                var regex = new RegExp(word, 'g');
                var matches = text.match(regex);
                if (matches) detected.push({ word: word, count: matches.length });
            });
            return detected;
        }

        function highlightAhWords(text) {
            var result = text;
            AH_WORDS.forEach(function(word) {
                var regex = new RegExp(word, 'g');
                result = result.replaceAll(word, '<span class="ah-word">' + word + '</span>');
            });
            return result;
        }

        /* 语音识别 */
        function initSpeechRecognition() {
            var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) {
                alert('您的浏览器不支持语音识别，请使用 Chrome、Edge 或 Safari 浏览器。');
                return null;
            }
            var rec = new SR();
            rec.continuous = true;
            rec.interimResults = true;
            rec.lang = currentLang === 'zh' ? 'zh-CN' : 'en-US';
            rec.onresult = function(event) {
                var finalTranscript = '';
                for (var i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal)
                        finalTranscript += event.results[i][0].transcript;
                }
                if (finalTranscript && currentSpeaker) processTranscript(finalTranscript);
            };
            rec.onerror = function(event) {
                console.error('语音识别错误:', event.error);
                if (event.error !== 'no-speech' && event.error !== 'aborted')
                    alert('语音识别出错: ' + event.error);
            };
            rec.onend = function() {
                if (isListening) rec.start();
            };
            return rec;
        }

        function processTranscript(text) {
            var detected = detectAhWords(text);
            if (detected.length > 0) {
                detected.forEach(function(item) {
                    stats[currentSpeaker].words[item.word] += item.count;
                    stats[currentSpeaker].total += item.count;
                    var safeId = item.word.replace(/\s+/g, '_');
                    var el = document.getElementById('currentAhGrid-' + safeId);
                    if (el) {
                        el.classList.add('highlight');
                        setTimeout(function() { el.classList.remove('highlight'); }, 500);
                    }
                });
                updateCurrentStats();
                updateTotalStats();
            }
            var speaker = speakers.find(function(s) { return s.id === currentSpeaker; });
            var entry = {
                speaker: speaker ? speaker.name : currentSpeaker,
                text: text,
                ahCount: detected.reduce(function(sum, d) { return sum + d.count; }, 0)
            };
            transcriptHistory.push(entry);
            updateTranscriptDisplay(entry);
        }

        function updateTranscriptDisplay(entry) {
            var box = document.getElementById('transcriptBox');
            if (transcriptHistory.length === 1) box.innerHTML = '';
            var seg = document.createElement('div');
            seg.className = 'segment';
            seg.innerHTML = '<span class="speaker">' + entry.speaker + ':</span> ' +
                highlightAhWords(entry.text) +
                (entry.ahCount > 0
                    ? '<span style="color:#ff6b6b;font-size:0.85rem;margin-left:8px;">(+' + entry.ahCount + ')</span>'
                    : '');
            box.appendChild(seg);
            box.scrollTop = box.scrollHeight;
        }

        /* 会议控制 */
        function startSession() {
            if (!currentSpeaker) {
                alert('请先选择当前发言人！');
                return;
            }
            recognition = initSpeechRecognition();
            if (!recognition) return;
            try {
                recognition.start();
                isListening = true;
                startSpeakerTimer(currentSpeaker);
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('exportBtn').disabled = false;
                document.getElementById('statusDot').classList.add('listening');
                document.getElementById('statusText').textContent = '正在聆听...';
            } catch (e) {
                console.error('启动失败:', e);
                alert('启动语音识别失败，请检查麦克风权限。');
            }
        }

        function stopSession() {
            if (recognition) {
                recognition.stop();
                isListening = false;
            }
            if (currentSpeaker) {
                pauseSpeakerTimer(currentSpeaker);
                var timerEl = document.getElementById('timer-' + currentSpeaker);
                if (timerEl) timerEl.textContent = formatTime(getSpeakerSeconds(currentSpeaker));
                refreshCurrentMeta(currentSpeaker);
            }
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('statusDot').classList.remove('listening');
            document.getElementById('statusText').textContent = '已停止';
        }

        /* 导出报告 */
        function exportReport() {
            var report = generateReport();
            var blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = '哼哈官报告_' + new Date().toLocaleDateString('zh-CN').replace(/\//g, '-') + '.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        function generateReport() {
            var date = new Date().toLocaleDateString('zh-CN');
            var report = '═══════════════════════════════════════\n' +
                       '       Toastmasters 哼哈官报告\n' +
                       '═══════════════════════════════════════\n' +
                       '日期: ' + date + '\n\n';

            var grandTotal = 0;
            speakers.forEach(function(s) {
                if (!stats[s.id] || stats[s.id].total === 0) return;
                grandTotal += stats[s.id].total;
                var secs = getSpeakerSeconds(s.id);
                var timeStr = formatTime(secs);
                var rateStr = secs >= 10
                    ? (stats[s.id].total / (secs / 60)).toFixed(1) + (currentLang === 'zh' ? ' 次/分钟' : '/min')
                    : (currentLang === 'zh' ? '数据不足' : 'insufficient data');
                report += '\n【' + s.icon + ' ' + s.name + '】\n';
                report += '  总计赘语: ' + stats[s.id].total + ' 次\n';
                report += '  发言时长: ' + timeStr + '\n';
                report += '  哼哈频率: ' + rateStr + '\n';
                var words = Object.entries(stats[s.id].words)
                    .filter(function(wc) { return wc[1] > 0; })
                    .sort(function(a, b) { return b[1] - a[1]; });
                if (words.length > 0) {
                    report += '  赘语明细: ';
                    report += words.map(function(wc) { return '"' + wc[0] + '"x' + wc[1]; }).join(', ');
                    report += '\n';
                }
            });

            report += '\n───────────────────────────────────────\n' +
                    '全场总计: ' + grandTotal + ' 次赘语\n' +
                    '═══════════════════════════════════════\n\n' +
                    '【温馨提示】\n减少赘语的小技巧:\n' +
                    '• 用短暂停顿代替"嗯""啊"\n' +
                    '• 提前准备演讲稿框架\n' +
                    '• 放慢语速，给自己思考时间\n' +
                    '• 多练习，形成肌肉记忆\n\n' +
                    '═══════════════════════════════════════\n' +
                    '        AI 哼哈官 - 助力卓越演讲\n' +
                    '═══════════════════════════════════════\n';
            return report;
        }

        /* 重置 */
        function resetAll() {
            if (transcriptHistory.length > 0) {
                if (!confirm('确定要重置所有数据吗？当前统计将被清除。')) return;
            }
            stopSession();
            speakers = DEFAULT_SPEAKERS.map(function(s) {
                return { id: s.id, name: s.name, icon: s.icon, custom: s.custom };
            });
            customIdCounter = 1;
            initStats();
            initTimers();
            transcriptHistory = [];
            currentSpeaker = null;
            renderSpeakerGrid();
            resetCurrentAhGrid();
            AH_WORDS.forEach(function(w) {
                var safeId = w.replace(/\s+/g, '_');
                var el = document.getElementById('totalAhGrid-' + safeId);
                if (el) el.getElementsByClassName('count')[0].textContent = '0';
            });
            document.getElementById('currentSpeakerName').textContent = '请选择发言人';
            document.getElementById('currentSpeakerTotal').textContent = '0 次哼哈';
            document.getElementById('currentSpeakerTime').textContent = '—';
            document.getElementById('currentSpeakerRate').textContent = '—';
            document.getElementById('transcriptBox').innerHTML =
                '<p style="color:#adb5bd;text-align:center;margin-top:60px;">点击"开始"按钮后，这里将显示实时转写内容...</p>';
            document.getElementById('statusDot').classList.remove('listening');
            document.getElementById('statusText').textContent = '准备就绪';
            document.getElementById('exportBtn').disabled = true;
        }

        /* 初始化 */
        window.onload = function() {
            initStats();
            initTimers();
            initUI();
        };
    </script>
</body>
</html>
