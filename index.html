        .export-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 AI 哼哈官</h1>
            <p>Toastmasters 会议赘语统计助手</p>
        </header>

        <div class="main-content">
            <div class="panel control-panel">
                <h2>⚙️ 会议控制</h2>
                
                <div class="status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">准备就绪</span>
                </div>

                <div class="session-controls">
                    <button class="btn btn-primary" id="startBtn" onclick="startSession()">
                        🎤 开始
                    </button>
                    <button class="btn btn-danger" id="stopBtn" onclick="stopSession()" disabled>
                        ⏹️ 停止
                    </button>
                </div>

                <div class="speaker-section">
                    <h3>👤 当前发言人</h3>
                    <div class="speaker-grid" id="speakerGrid"></div>
                </div>

                <div class="export-section">
                    <button class="btn btn-success" onclick="exportReport()" id="exportBtn" disabled>
                        📊 导出报告
                    </button>
                    <button class="btn btn-secondary" onclick="resetAll()" style="margin-left: 10px;">
                        🔄 重置
                    </button>
                </div>
            </div>

            <div class="panel stats-panel">
                <h2>📊 实时统计</h2>

                <div class="current-speaker">
                    <div class="label">当前发言人</div>
                    <div class="name" id="currentSpeakerName">请选择发言人</div>
                    <div class="total" id="currentSpeakerTotal">0 次哼哈</div>
                </div>

                <div class="ah-stats">
                    <h3>🗣️ 当前发言人哼哈词统计</h3>
                    <div class="ah-grid" id="currentAhGrid"></div>
                </div>

                <div class="ah-stats">
                    <h3>📈 全场汇总</h3>
                    <div class="ah-grid" id="totalAhGrid"></div>
                </div>

                <div class="transcript-section">
                    <h3>📝 实时转写</h3>
                    <div class="transcript-box" id="transcriptBox">
                        <p style="color: #adb5bd; text-align: center; margin-top: 60px;">
                            点击"开始"按钮后，这里将显示实时转写内容...
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SPEAKERS = [
            { id: 'host', name: '主持人', icon: '🎙️' },
            { id: 'speaker1', name: '备稿演讲人1', icon: '🎤' },
            { id: 'speaker2', name: '备稿演讲人2', icon: '🎤' },
            { id: 'speaker3', name: '备稿演讲人3', icon: '🎤' },
            { id: 'evaluator1', name: '备稿点评1', icon: '📋' },
            { id: 'evaluator2', name: '备稿点评2', icon: '📋' },
            { id: 'evaluator3', name: '备稿点评3', icon: '📋' },
            { id: 'tt_host', name: '即兴演讲主持人', icon: '🎭' },
            { id: 'tt_speaker1', name: '即兴演讲人1', icon: '🌟' },
            { id: 'tt_speaker2', name: '即兴演讲人2', icon: '🌟' },
            { id: 'tt_speaker3', name: '即兴演讲人3', icon: '🌟' },
            { id: 'tt_speaker4', name: '即兴演讲人4', icon: '🌟' },
            { id: 'ge', name: '总评', icon: '🏆' }
        ];

        const AH_WORDS = [
            '嗯', '啊', '呃', '额', '那个', '这个', 
            '就是说', '然后', '其实', '就是', '对吧',
            '知道', '明白', '一个', '可能', '应该',
            '或者', '还是', '怎么', '什么'
        ];

        let currentSpeaker = null;
        let isListening = false;
        let recognition = null;
        let stats = {};
        let transcriptHistory = [];

        function initStats() {
            stats = {};
            SPEAKERS.forEach(function(s) {
                stats[s.id] = { 
                    name: s.name, 
                    total: 0,
                    words: {} 
                };
                AH_WORDS.forEach(function(w) {
                    stats[s.id].words[w] = 0;
                });
            });
        }

        function initUI() {
            var speakerGrid = document.getElementById('speakerGrid');
            speakerGrid.innerHTML = SPEAKERS.map(function(s) { 
                return '<button class="speaker-btn" data-id="' + s.id + '" onclick="selectSpeaker(\'' + s.id + '\')">' +
                    '<span>' + s.icon + ' ' + s.name + '</span>' +
                    '<span class="count" id="count-' + s.id + '">0</span>' +
                '</button>';
            }).join('');

            renderAhGrid('currentAhGrid');
            renderAhGrid('totalAhGrid');
        }

        function renderAhGrid(containerId) {
            var container = document.getElementById(containerId);
            container.innerHTML = AH_WORDS.map(function(w) { 
                return '<div class="ah-item" id="' + containerId + '-' + w + '">' +
                    '<div class="word">"' + w + '"</div>' +
                    '<div class="count" id="' + containerId + '-count-' + w + '">0</div>' +
                '</div>';
            }).join('');
        }

        function selectSpeaker(speakerId) {
            document.querySelectorAll('.speaker-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.id === speakerId);
            });

            currentSpeaker = speakerId;
            var speaker = SPEAKERS.find(function(s) { return s.id === speakerId; });
            
            document.getElementById('currentSpeakerName').textContent = speaker.name;
            updateCurrentStats();
        }

        function updateCurrentStats() {
            if (!currentSpeaker) return;

            var speakerStats = stats[currentSpeaker];
            document.getElementById('currentSpeakerTotal').textContent = speakerStats.total + ' 次哼哈';

            AH_WORDS.forEach(function(w) {
                var el = document.getElementById('currentAhGrid-count-' + w);
                if (el) el.textContent = speakerStats.words[w] || 0;
            });
        }

        function updateTotalStats() {
            var totalAll = 0;
            var totalByWord = {};
            
            AH_WORDS.forEach(function(w) { totalByWord[w] = 0; });

            SPEAKERS.forEach(function(s) {
                totalAll += stats[s.id].total;
                AH_WORDS.forEach(function(w) {
                    totalByWord[w] += stats[s.id].words[w] || 0;
                });
                
                var countEl = document.getElementById('count-' + s.id);
                if (countEl) countEl.textContent = stats[s.id].total;
            });

            AH_WORDS.forEach(function(w) {
                var el = document.getElementById('totalAhGrid-count-' + w);
                if (el) el.textContent = totalByWord[w];
            });
        }

        function detectAhWords(text) {
            var detected = [];
            
            AH_WORDS.forEach(function(word) {
                var regex = new RegExp(word, 'g');
                var matches = text.match(regex);
                if (matches) {
                    detected.push({ word: word, count: matches.length });
                }
            });

            return detected;
        }

        function highlightAhWords(text) {
            var result = text;
            AH_WORDS.forEach(function(word) {
                var regex = new RegExp(word, 'g');
                result = result.replace(regex, '<span class="ah-word">' + word + '</span>');
            });
            return result;
        }

        function initSpeechRecognition() {
            var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                alert('您的浏览器不支持语音识别，请使用 Chrome、Edge 或 Safari 浏览器。');
                return null;
            }

            var recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';

            recognition.onresult = function(event) {
                var finalTranscript = '';

                for (var i = event.resultIndex; i < event.results.length; i++) {
                    var transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    }
                }

                if (finalTranscript && currentSpeaker) {
                    processTranscript(finalTranscript);
                }
            };

            recognition.onerror = function(event) {
                console.error('语音识别错误:', event.error);
                if (event.error !== 'no-speech' && event.error !== 'aborted') {
                    alert('语音识别出错: ' + event.error);
                }
            };

            recognition.onend = function() {
                if (isListening) {
                    recognition.start();
                }
            };

            return recognition;
        }

        function processTranscript(text) {
            var detected = detectAhWords(text);
            
            if (detected.length > 0) {
                detected.forEach(function(item) {
                    stats[currentSpeaker].words[item.word] += item.count;
                    stats[currentSpeaker].total += item.count;
                    
                    var el = document.getElementById('currentAhGrid-' + item.word);
                    if (el) {
                        el.classList.add('highlight');
                        setTimeout(function() { el.classList.remove('highlight'); }, 500);
                    }
                });

                updateCurrentStats();
                updateTotalStats();
            }

            var speaker = SPEAKERS.find(function(s) { return s.id === currentSpeaker; });
            var transcriptEntry = {
                speaker: speaker.name,
                text: text,
                ahCount: detected.reduce(function(sum, d) { return sum + d.count; }, 0)
            };
            transcriptHistory.push(transcriptEntry);

            updateTranscriptDisplay(transcriptEntry);
        }

        function updateTranscriptDisplay(entry) {
            var box = document.getElementById('transcriptBox');
            
            if (transcriptHistory.length === 1) {
                box.innerHTML = '';
            }

            var segment = document.createElement('div');
            segment.className = 'segment';
            segment.innerHTML = '<span class="speaker">' + entry.speaker + ':</span> ' +
                highlightAhWords(entry.text) +
                (entry.ahCount > 0 ? '<span style="color: #ff6b6b; font-size: 0.85rem; margin-left: 8px;">(+' + entry.ahCount + ')</span>' : '');
            
            box.appendChild(segment);
            box.scrollTop = box.scrollHeight;
        }

        function startSession() {
            if (!currentSpeaker) {
                alert('请先选择当前发言人！');
                return;
            }

            recognition = initSpeechRecognition();
            if (!recognition) return;

            try {
                recognition.start();
                isListening = true;

                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('exportBtn').disabled = false;

                document.getElementById('statusDot').classList.add('listening');
                document.getElementById('statusText').textContent = '正在聆听...';
            } catch (e) {
                console.error('启动失败:', e);
                alert('启动语音识别失败，请检查麦克风权限。');
            }
        }

        function stopSession() {
            if (recognition) {
                recognition.stop();
                isListening = false;
            }

            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;

            document.getElementById('statusDot').classList.remove('listening');
            document.getElementById('statusText').textContent = '已停止';
        }

        function exportReport() {
            var report = generateReport();
            var blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            
            var a = document.createElement('a');
            a.href = url;
            a.download = '哼哈官报告_' + new Date().toLocaleDateString('zh-CN').replace(/\//g, '-') + '.txt';
            a.click();
            
            URL.revokeObjectURL(url);
        }

        function generateReport() {
            var date = new Date().toLocaleDateString('zh-CN');
            var report = '═══════════════════════════════════════\n       Toastmasters 哼哈官报告\n═══════════════════════════════════════\n日期: ' + date + '\n\n';

            var grandTotal = 0;
            SPEAKERS.forEach(function(s) {
                if (stats[s.id].total > 0) {
                    grandTotal += stats[s.id].total;
                    report += '\n【' + s.icon + ' ' + s.name + '】共 ' + stats[s.id].total + ' 次\n';
                    
                    var words = Object.entries(stats[s.id].words)
                        .filter(function(wc) { return wc[1] > 0; })
                        .sort(function(a, b) { return b[1] - a[1]; });
                    
                    if (words.length > 0) {
                        report += '  赘语明细: ';
                        report += words.map(function(wc) { return '"' + wc[0] + '"x' + wc[1]; }).join(', ');
                        report += '\n';
                    }
                }
            });

            report += '\n───────────────────────────────────────\n全场总计: ' + grandTotal + ' 次赘语\n═══════════════════════════════════════\n\n【温馨提示】\n减少赘语的小技巧:\n• 用短暂停顿代替"嗯""啊"\n• 提前准备演讲稿框架\n• 放慢语速，给自己思考时间\n• 多练习，形成肌肉记忆\n\n═══════════════════════════════════════\n        AI 哼哈官 - 助力卓越演讲\n═══════════════════════════════════════\n';

            return report;
        }

        function resetAll() {
            if (transcriptHistory.length > 0) {
                if (!confirm('确定要重置所有数据吗？当前统计将被清除。')) {
                    return;
                }
            }

            stopSession();
            initStats();
            transcriptHistory = [];
            currentSpeaker = null;

            document.querySelectorAll('.speaker-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });

            document.querySelectorAll('.speaker-btn .count').forEach(function(el) {
                el.textContent = '0';
            });

            document.getElementById('currentSpeakerName').textContent = '请选择发言人';
            document.getElementById('currentSpeakerTotal').textContent = '0 次哼哈';
            
            AH_WORDS.forEach(function(w) {
                var currentEl = document.getElementById('currentAhGrid-count-' + w);
                var totalEl = document.getElementById('totalAhGrid-count-' + w);
                if (currentEl) currentEl.textContent = '0';
                if (totalEl) totalEl.textContent = '0';
            });

            document.getElementById('transcriptBox').innerHTML = '<p style="color: #adb5bd; text-align: center; margin-top: 60px;">点击"开始"按钮后，这里将显示实时转写内容...</p>';

            document.getElementById('statusDot').classList.remove('listening');
            document.getElementById('statusText').textContent = '准备就绪';
            document.getElementById('exportBtn').disabled = true;
        }

        window.onload = function() {
            initStats();
            initUI();
        };
    </script>
</body>
</html>
